server {
  listen 80;
  server_name client.eventusproduction.com;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name client.eventusproduction.com;

  # Keep the existing ssl_certificate / ssl_certificate_key lines from the current server config.

  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    application/javascript
    application/json
    application/rss+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/xml
    font/opentype
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # Enable only if the Nginx Brotli module is installed.
  # brotli on;
  # brotli_comp_level 5;
  # brotli_static on;
  # brotli_types
  #   application/javascript
  #   application/json
  #   image/svg+xml
  #   text/css
  #   text/plain;

  location /assets/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
